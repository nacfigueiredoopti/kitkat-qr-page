<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan to view — KitKat 4 Finger Milk Chocolate 41.5g</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --card: #ffffff;
      --accent: #d70010;
      --text: #2b2b2b;
      --muted: #6b6b6b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      padding: 36px 32px 28px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }
    h1 {
      font-size: 1.35rem;
      line-height: 1.3;
      margin: 0 0 6px;
    }
    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 28px;
    }
    .qr {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #fff;
      border: 1px solid #ececec;
      border-radius: 16px;
    }
    .qr img, .qr canvas {
      display: block;
      width: 280px;
      height: 280px;
      image-rendering: pixelated;
    }
    .hint {
      margin: 22px 0 18px;
      font-size: 0.95rem;
      color: var(--muted);
    }
    a.link {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 0.95rem;
      transition: transform 0.05s ease, opacity 0.2s ease;
      word-break: break-word;
    }
    a.link:hover { opacity: 0.92; }
    a.link:active { transform: scale(0.98); }
    .raw {
      margin-top: 16px;
      font-size: 0.78rem;
      color: var(--muted);
      word-break: break-all;
    }
    .raw a { color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <h1>KitKat 4 Finger Milk Chocolate 41.5g</h1>
    <p class="sub">Scan the QR code with your phone camera to open the page.</p>

    <div class="qr">
      <!-- Primary: rendered client-side, fully self-contained. Fallback: QR image API. -->
      <div id="qrcode"></div>
    </div>

    <p class="hint">Or tap the button below:</p>
    <a class="link" id="cta" href="https://sparkling-flan-5a1cf0.netlify.app/archive/kitkat-4-finger-milk-chocolate-41-5g/">Open the page</a>

    <p class="raw">
      <a id="rawlink" href="https://sparkling-flan-5a1cf0.netlify.app/archive/kitkat-4-finger-milk-chocolate-41-5g/">https://sparkling-flan-5a1cf0.netlify.app/archive/kitkat-4-finger-milk-chocolate-41-5g/</a>
    </p>
  </main>

  <script>
    var TARGET_URL = "https://sparkling-flan-5a1cf0.netlify.app/archive/kitkat-4-finger-milk-chocolate-41-5g/";
    var container = document.getElementById("qrcode");

    // Fallback renderer: a QR image generated by a public API (used only if the JS library fails to load).
    function renderImageFallback() {
      container.innerHTML = "";
      var img = document.createElement("img");
      img.alt = "QR code linking to the KitKat product page";
      img.width = 280;
      img.height = 280;
      img.src = "https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=0&data=" + encodeURIComponent(TARGET_URL);
      container.appendChild(img);
    }

    // Primary renderer: qrcodejs (self-contained client-side QR generation, no network call to draw).
    var s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js";
    s.onload = function () {
      try {
        new QRCode(container, {
          text: TARGET_URL,
          width: 280,
          height: 280,
          colorDark: "#2b2b2b",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch (e) {
        renderImageFallback();
      }
    };
    s.onerror = renderImageFallback;
    document.head.appendChild(s);
  </script>
</body>
</html>
